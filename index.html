<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFeed — ITエンジニアニュース</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;1,8..60,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="masthead">
  <div class="masthead-top">
    <div class="site-name">DevFeed</div>
    <div class="masthead-meta">
      <div class="masthead-date" id="masthead-date"></div>
      <div class="masthead-tagline">ITエンジニアのための技術情報紙</div>
    </div>
    <select class="date-select" id="date-select" disabled>
      <option value="">選択してください</option>
    </select>
  </div>
  <div class="edition-bar" id="edition-bar">
    <div class="edition-tab active" data-source="all">
      <span class="dot dot-all"></span>すべて
    </div>
    <div class="edition-tab" data-source="hn">
      <span class="dot dot-hn"></span>Hacker News
    </div>
    <div class="edition-tab" data-source="zenn">
      <span class="dot dot-zenn"></span>Zenn
    </div>
    <div class="edition-tab" data-source="qiita">
      <span class="dot dot-qiita"></span>Qiita
    </div>
    <div class="edition-tab" data-source="apple">
      <span class="dot dot-apple"></span>Apple Dev
    </div>
    <div class="edition-tab" data-source="android">
      <span class="dot dot-android"></span>Android
    </div>
    <div class="edition-tab" data-source="9to5mac">
      <span class="dot dot-9to5mac"></span>9to5Mac
    </div>
    <div class="edition-tab" data-source="9to5google">
      <span class="dot dot-9to5google"></span>9to5Google
    </div>
  </div>
</div>

<div id="app"></div>

<footer>
  <div class="footer-name">DevFeed</div>
  <div class="legend">
    <div class="legend-item"><span class="dot dot-hn"></span>Hacker News</div>
    <div class="legend-item"><span class="dot dot-zenn"></span>Zenn</div>
    <div class="legend-item"><span class="dot dot-qiita"></span>Qiita</div>
    <div class="legend-item"><span class="dot dot-apple"></span>Apple Dev</div>
    <div class="legend-item"><span class="dot dot-android"></span>Android</div>
    <div class="legend-item"><span class="dot dot-9to5mac"></span>9to5Mac</div>
    <div class="legend-item"><span class="dot dot-9to5google"></span>9to5Google</div>
    <div class="legend-item"><span class="dot dot-ai"></span>AI 要約</div>
  </div>
  <div style="display:flex;flex-direction:column;gap:6px;align-items:flex-end">
    <div class="footer-info" id="footer-info">fetch_news.py で生成した Markdown を読み込んでください</div>
    <div class="apikey-area">
      <span class="apikey-label">Anthropic API Key</span>
      <input id="apikey-input" class="apikey-input" type="password"
        placeholder="sk-ant-..."
        onkeydown="if(event.key==='Enter')setApiKey()">
      <button class="apikey-save-btn" onclick="setApiKey()">保存</button>
    </div>
  </div>
</footer>

<input type="file" id="file-input" accept=".md" multiple>

<script src="app.js"></script>
</body>
</html>
